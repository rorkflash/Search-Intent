services:
  search-intent:
    build: .
    ports:
      - "8080:8080"
    environment:
      SEARCH_INTENT_ENV: development
      SEARCH_INTENT_CONFIG_DIR: ./config
      REDIS_URL: redis://redis:6379/0
      TARGET_API_BASE_URL: https://api.example.com
    volumes:
      - ./config:/app/config:ro
      - ./plugins:/app/plugins:ro
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
